name: Hatena Blog Auto Post

on:
  schedule:
    # 毎日午前7:00 JST (UTC 22:00) に起動
    - cron: '0 22 * * *'
  workflow_dispatch: # GitHub Web UIから手動で実行可能にする

jobs:
  publish-all-articles:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 依存関係のインストール
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 google-genai

      - name: Debaser Magazineの最新記事の取得と投稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        continue-on-error: true
        run: |
          python debaser_blog_generator.py --site debaser --publish --max-check-pages 10

      - name: StreetVoice Blow（台湾）の最新記事の取得と投稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        continue-on-error: true
        run: |
          python debaser_blog_generator.py --site streetvoice --publish --max-check-pages 10

      - name: What The Duck（タイ）の最新記事の取得と投稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        continue-on-error: true
        run: |
          python debaser_blog_generator.py --site whattheduck --publish --max-check-pages 10

      - name: Korean Indie（韓国）の最新記事の取得と投稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        continue-on-error: true
        run: |
          python debaser_blog_generator.py --site koreanindie --publish --max-check-pages 10

      - name: Fungjaizine（タイ）の最新記事の取得と投稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        continue-on-error: true
        run: |
          python debaser_blog_generator.py --site fungjaizine --publish --max-check-pages 10

      - name: Pop Hari Ini（インドネシア）の最新記事の取得と投稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        continue-on-error: true
        run: |
          python debaser_blog_generator.py --site pophariini --publish --max-check-pages 10

      - name: Whiteboard Journal（インドネシア）の最新記事の取得と投稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID: ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
        continue-on-error: true
        run: |
          python debaser_blog_generator.py --site whiteboardjournal --publish --max-check-pages 10
